version: '3.8'

services:
  auramarket:
    build:
      context: .
      dockerfile: Dockerfile
    image: auramarket-frontend:latest
    container_name: auramarket_app
    ports:
      - "3000:3000"
    restart: unless-stopped
    depends_on:
      - backend
      - mysql
    environment:
      - NODE_ENV=production
      - MYSQL_HOST=mysql
      - MYSQL_PORT=3306
      - MYSQL_DATABASE=mydatabase
      - MYSQL_USER=admin
      - MYSQL_PASSWORD=password123
      - VITE_BACKEND_API_URL=http://localhost:8000

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: auramarket-backend:latest
    container_name: auramarket_backend
    ports:
      - "8000:8000"
    restart: unless-stopped
    depends_on:
      - mysql
    environment:
      - MYSQL_HOST=mysql
      - MYSQL_PORT=3306
      - MYSQL_DATABASE=mydatabase
      - MYSQL_USER=admin
      - MYSQL_PASSWORD=password123

  mysql:
    image: mysql:8.0
    container_name: auramarket_db
    ports:
      - "3306:3306"
    restart: unless-stopped
    environment:
      - MYSQL_ROOT_PASSWORD=password123
      - MYSQL_DATABASE=mydatabase
      - MYSQL_USER=admin
      - MYSQL_PASSWORD=password123
    volumes:
      - mysql_data:/var/lib/mysql

volumes:
  mysql_data:

